version: '3.8'

services:
  achadinhos-shopee:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: achadinhos-shopee
    env_file:
      - .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OPERATION_MODE=${OPERATION_MODE:-once}
    volumes:
      # Monta código para desenvolvimento (remover em produção)
      - ./app:/app/app
      # Persiste logs
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - achadinhos-network

  # Opcional: adicionar banco de dados para persistência
  # postgres:
