services:
  publisher:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: achadinhos-publisher
    env_file:
      - .env
    environment:
      - OPERATION_MODE=loop
      - LOOP_INTERVAL_SECONDS=${LOOP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - achadinhos-network

  monitor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: achadinhos-monitor
    env_file:
      - .env
    environment:
      - OPERATION_MODE=monitor_loop
      - MONITOR_INTERVAL_SECONDS=${MONITOR_INTERVAL_SECONDS:-300}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - publisher
    networks:
      - achadinhos-network

networks:
  achadinhos-network:
    driver: bridge
